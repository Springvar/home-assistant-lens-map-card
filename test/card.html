<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Lens Map Card Demo</title>
        <script type="module" src="../dist/home-assistant-lens-map-card.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
        <style>
            :root {
                --primary-color: #03a9f4;
                --accent-color: #ff9800;
                --primary-background-color: #fafafa;
                --secondary-background-color: #e0e0e0;
                --ha-card-background: #fff;
                --ha-card-box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.12);
                --primary-text-color: #212121;
                --secondary-text-color: #757575;
                --info-color: #2196f3;
                --success-color: #43a047;
                --warning-color: #fb8c00;
                --error-color: #c0392b;
            }
            body {
                background: #fafafa;
                font-family: sans-serif;
                margin: 0;
                padding: 2em;
            }
            lens-map-card {
                max-width: 500px;
                display: block;
                margin: 2em auto;
            }
        </style>
    </head>
    <body>
        <lens-map-card id="lensmapcard"></lens-map-card>
        <script>
            const dummyHass = {
                states: {
                    'person.john_doe': {
                        state: 'home',
                        attributes: {
                            friendly_name: 'John Doe',
                            latitude: 63.4305,
                            longitude: 10.3951
                        }
                    },
                    'person.jane_doe': {
                        state: 'away',
                        attributes: {
                            friendly_name: 'Jane Doe',
                            latitude: 63.4100,
                            longitude: 10.4200
                        }
                    },
                    'person.bob_doe': {
                        state: 'home',
                        attributes: {
                            friendly_name: 'Bob Doe',
                            latitude: 63.4041,
                            longitude: 10.4301
                        }
                    },
                    'zone.home': {
                        state: 'zoning',
                        attributes: {
                            friendly_name: 'Home',
                            latitude: 63.4041,
                            longitude: 10.4301,
                            radius: 100
                        }
                    },
                    'zone.office': {
                        state: 'zoning',
                        attributes: {
                            friendly_name: 'Office',
                            latitude: 63.4305,
                            longitude: 10.3951,
                            radius: 100
                        }
                    }
                }
            };

            function getConfigFile() {
                const params = new URLSearchParams(window.location.search);
                const cfgName = params.get('config');
                return cfgName ? `${cfgName}.yaml` : 'config.yaml';
            }

            fetch(getConfigFile())
                .then(resp => {
                    if (!resp.ok) throw new Error("Config file not found");
                    return resp.text();
                })
                .then(yamlSource => {
                    const cardConfig = window.jsyaml.load(yamlSource);
                    window.customElements.whenDefined('lens-map-card').then(() => {
                        const card = document.getElementById('lensmapcard');
                        card.setConfig(cardConfig);
                        card.hass = dummyHass;
                    });
                })
                .catch(e => {
                    console.error("Error loading config:", e);
                });
        </script>
    </body>
</html>
